<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FB923C"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- sunrise arc with rays -->
  <g transform="translate(8 18)">
    <line x1="22" y1="6" x2="22" y2="0" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    <line x1="6" y1="22" x2="0" y2="22" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    <line x1="38" y1="22" x2="44" y2="22" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="10" x2="6" y2="6" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    <line x1="34" y1="10" x2="38" y2="6" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    <path d="M2 38 A 20 20 0 0 1 42 38 Z" fill="url(#sun)"/>
    <line x1="0" y1="42" x2="44" y2="42" stroke="#0A2540" stroke-width="1.5"/>
  </g>
  <!-- SUNRISE -->
  <text x="60" y="34" font-family="Georgia, serif" font-weight="700" font-size="22" letter-spacing="-0.01em" fill="#0A2540">Sunrise</text>
  <!-- PHARMACY -->
  <text x="60" y="58" font-family="Inter, sans-serif" font-weight="500" font-size="11" letter-spacing="0.32em" fill="#F59E0B">PHARMACY</text>
</svg>
