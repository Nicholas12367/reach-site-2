<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- wheat sheaf mark, Ukrainian colors -->
  <g transform="translate(8 12)">
    <rect x="6" y="32" width="36" height="22" fill="#0057B7" rx="2"/>
    <rect x="6" y="6" width="36" height="22" fill="#FFD700" rx="2"/>
    <!-- wheat grains -->
    <g transform="translate(24 24)" fill="#9C7A1A">
      <ellipse cx="0" cy="-12" rx="2.2" ry="4"/>
      <ellipse cx="-4" cy="-8" rx="2" ry="3.5"/>
      <ellipse cx="4" cy="-8" rx="2" ry="3.5"/>
      <ellipse cx="-3" cy="-3" rx="2" ry="3.5"/>
      <ellipse cx="3" cy="-3" rx="2" ry="3.5"/>
      <ellipse cx="0" cy="2" rx="2" ry="3.5"/>
      <line x1="0" y1="3" x2="0" y2="14" stroke="#9C7A1A" stroke-width="1.5"/>
    </g>
  </g>
  <!-- Hotsul's -->
  <text x="60" y="36" font-family="Georgia, serif" font-weight="700" font-size="22" letter-spacing="-0.01em" fill="#0057B7">Hotsul's</text>
  <!-- UKRAINIAN -->
  <text x="60" y="58" font-family="Inter, sans-serif" font-weight="600" font-size="10" letter-spacing="0.32em" fill="#1A1A2E">UKRAINIAN  KITCHEN</text>
</svg>
